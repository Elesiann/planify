name: Keep Supabase Awake

on:
  schedule:
    # Supabase free projects pause after 7 days of inactivity.
    # Run every 5 days to leave room for delayed or skipped scheduled jobs.
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping /health
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping health endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail

          if [ -z "${APP_URL}" ]; then
            echo "Missing APP_URL repository secret."
            echo "Set it to your app's base URL, e.g. https://planify.vercel.app"
            exit 1
          fi

          curl --fail --silent --show-error \
            "${APP_URL}/health" \
            --output /dev/null
