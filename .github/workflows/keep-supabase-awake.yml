name: Keep Supabase Awake

on:
  schedule:
    # Supabase free projects pause after 7 days of inactivity.
    # Run every 5 days to leave room for delayed or skipped scheduled jobs.
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase Auth health
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /auth/v1/health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          curl --fail --silent --show-error \
            "${SUPABASE_URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            --output /dev/null
